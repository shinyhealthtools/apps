<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const ShinyHealthTools = () => {
            // dark mode
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem('theme');
                if (saved === 'dark') {
                    document.body.classList.add('dark-mode');
                    return true;
                }
                if (saved === 'light') {
                    document.body.classList.remove('dark-mode');
                    return false;
                }
                const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (prefers) document.body.classList.add('dark-mode');
                return prefers;
            });

            const toggleTheme = () => {
                const newMode = !darkMode;
                setDarkMode(newMode);
                document.body.classList.toggle('dark-mode', newMode);
                localStorage.setItem('theme', newMode ? 'dark' : 'light');
            };

            const [activeTab, setActiveTab] = useState('home');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            // view counts
            const [appViews, setAppViews] = useState({
                FactorGuard: 16,
                CalcuStats: 16677,
                "CATrend Analyzer": 7598,
                "ROC Curve Builder": 16010,
                Data2SPSS: 12849,
                MedModr: 16068,
                "EpiDem Suite": 17089,
                ggPubPlot: 14552,
                "APA Table Generator": 3329,
                SysSampler: 3609,
                "CMH Analyzer": 6853,
                "TNMTC DataLab": 14408,
                "PharmaCalc Pro": 15510,
                "RegEffect Xplorer": 15381,
                "Data TransformR": 16859,
                CleanMyData: 14660,
                "KMPlot Genie": 16874,
                QuickStatsGen: 15106,
                "Robust Regressor": 15586,
                TagSelect: 16725,
                FAnalyzr: 16885
            });

            const totalViews = Object.values(appViews).reduce((a, b) => a + b, 0);

            // ----- ORIGINAL APP DESCRIPTIONS (restored) -----
            const shinyApps = [
                { id:1, name:"FactorGuard", desc:"A factor-retention decision tool for EFA", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/FactorGuard.png", run:"https://mudassiribrahim2026.shinyapps.io/FactorGuard/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/FactorGuard.R" },
                { id:2, name:"CalcuStats", desc:"Tool for sample size calculation, power analysis, and descriptive statistics", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/CalcuStats.png", run:"https://mudassiribrahim2025.shinyapps.io/CalcuStats/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/CalcuStats.R" },
                { id:3, name:"CATrend Analyzer", desc:"Cochran-Armitage test for trend tool", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/CAtrend.png", run:"https://newappstesting.shinyapps.io/CATrendAnalyzer/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/CATrendAnalyzer.R" },
                { id:4, name:"ROC Curve Builder", desc:"ROC curve analysis and diagnostic test evaluation", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/ROC.png", run:"https://mudassiribrahim30.shinyapps.io/ROC_CURVE/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/ROC%20Curve%20Builder.R" },
                { id:5, name:"Data2SPSS", desc:"Convert datasets in CSV, Excel, Rdata, Stata, or SAS format into SPSS (.sav) files", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/Data2SPSS.png", run:"https://newappstesting.shinyapps.io/Data2SPSS/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/Data2SPSS" },
                { id:6, name:"MedModr", desc:"Mediation and moderation analysis tool for research studies", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/MedModr.png", run:"https://mudassiribrahim30.shinyapps.io/MedModr/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/MedModr.R" },
                { id:7, name:"EpiDem Suite", desc:"Epidemiological data analysis suite for public health research", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/EpiDem.png", run:"https://mudassiribrahim2025.shinyapps.io/EpiDemSuite/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/EpiDem%20Suite.R" },
                { id:8, name:"ggPubPlot", desc:"Publication-ready ggplot2 visualizations with customization", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/ggLogo.png", run:"https://mudassiribrahim2025.shinyapps.io/ggPubPlot/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/ggPubPlot.R" },
                { id:9, name:"APA Table Generator", desc:"Generate APA formatted tables for research papers and publications", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/APA%20logo.png", run:"https://newappstesting.shinyapps.io/APATableGenerator/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/APA%20Table%20Generator%20Pro.R" },
                { id:10, name:"SysSampler", desc:"Systematic sampling tool for research studies with custom random start", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/Sys%20Sampler.png", run:"https://mudassiribrahim2025b.shinyapps.io/SysSampler/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/SysSampler" },
                { id:11, name:"CMH Analyzer", desc:"Cochran-Mantel-Haenszel analysis tool for stratified data", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/CMH.png", run:"https://newappstesting.shinyapps.io/CMHAnalyzer/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/CMHAnalyzer.R" },
                { id:12, name:"TNMTC DataLab", desc:"Comprehensive data analysis software", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/TNMTC.png", run:"https://newappstesting.shinyapps.io/NMTCDataLab/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/NMTC%20APP.R" },
                { id:13, name:"PharmaCalc Pro", desc:"Pharmaceutical calculations for dosage", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/Pharma.png", run:"https://mudassiribrahim2025b.shinyapps.io/PharmaCalcPro/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/PharmaCalcPro.R" },
                { id:14, name:"RegEffect Xplorer", desc:"Explore regression effects visually with interactive plots", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/RegEf.png", run:"https://mudassiribrahim2025b.shinyapps.io/RegEffectXplorer/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/RegEffectXplorer.R" },
                { id:15, name:"Data TransformR", desc:"Data transformation and preprocessing tool for analytics", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/DataTrans.png", run:"https://mudassiribrahim2025b.shinyapps.io/DataTransformR/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/DataTransformR.R" },
                { id:16, name:"CleanMyData", desc:"Data screening and cleaning tool with visualization", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/CleanMyData.png", run:"https://mudassiribrahim2025b.shinyapps.io/CleanMyData/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/CleanMyData.R" },
                { id:17, name:"KMPlot Genie", desc:"Kaplan-Meier survival plot generator for clinical studies", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/KMPlot.png", run:"https://mudassiribrahim30.shinyapps.io/KMPlotGenie/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/KMPlotGenie.R" },
                { id:18, name:"QuickStatsGen", desc:"Custom Data Generator for Statistical Practice and Education", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/QuickStats.png", run:"https://mudassiribrahim2025.shinyapps.io/QuickStatsGen/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/QuickStatsGen.R" },
                { id:19, name:"Robust Regressor", desc:"Robust regression analysis for outlier-resistant modeling", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/Robust.png", run:"https://mudassiribrahim2025.shinyapps.io/Robustregression/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/Robust%20%20Regressor.R" },
                { id:20, name:"TagSelect", desc:"Participant selection tool for research studies", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/TagSelect.png", run:"https://mudassiribrahim30.shinyapps.io/Tagselect/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/TagSelect.R" },
                { id:21, name:"FAnalyzr", desc:"Factor analysis and dimensionality reduction tool", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/FA.png", run:"https://mudassiribrahim30.shinyapps.io/fanalyzr/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/FAnalyzr.R" }
            ];

            const htmlApps = [
                { id:'h1', name:"CATrend Analyzer (HTML)", desc:"Cochran‑Armitage trend test calculator for dose‑response and ordinal trends. Instant p‑values.", url:"https://catrendanalyzer.mudasiribrahim.com" },
                { id:'h2', name:"Transpose Table", desc:"Convert cross‑tabulation data into column format for logistic regression or frequency analysis.", url:"https://transposetable.mudasiribrahim.com" },
                { id:'h3', name:"CalcuStats Lite", desc:"Sample size calculator (Taro Yamane, Cochran) with proportional allocation for multi‑stage surveys.", url:"https://calcustats.lite.mudasiribrahim.com" },
                { id:'h4', name:"Systematic Sampling Calculator", desc:"Compute sampling interval k with precision and confidence level options for survey research.", url:"https://systematic.sampling.mudasiribrahim.com" }
            ];

            const shinyWithViews = shinyApps.map(a => ({ ...a, views: appViews[a.name] || 0, type: 'shiny' }));

            // Alphabet filter – all letters active
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            const [selectedLetter, setSelectedLetter] = useState('');

            // Keyword search
            const [keyword, setKeyword] = useState('');

            // Apps starting with a letter (used to determine which letters have apps – all active anyway)
            const appsStartingWith = (letter) => {
                return shinyWithViews.filter(app => app.name.toUpperCase().startsWith(letter));
            };

            // Main filtered list
            const getFilteredApps = () => {
                let filtered = shinyWithViews;
                if (selectedLetter) {
                    filtered = filtered.filter(app => app.name.toUpperCase().startsWith(selectedLetter));
                }
                if (keyword.trim() !== '') {
                    const terms = keyword.toLowerCase().split(/\s+/);
                    const scored = filtered.map(app => {
                        const nameLower = app.name.toLowerCase();
                        const descLower = app.desc.toLowerCase();
                        let score = 0;
                        terms.forEach(term => {
                            if (nameLower.includes(term)) score += 3;
                            if (descLower.includes(term)) score += 1;
                        });
                        return { ...app, score };
                    });
                    filtered = scored.filter(a => a.score > 0).sort((a,b) => b.score - a.score);
                } else {
                    filtered = filtered.sort((a,b) => a.name.localeCompare(b.name));
                }
                return filtered;
            };

            const filteredApps = getFilteredApps();
            const topApps = [...shinyWithViews].sort((a,b)=>b.views-a.views).slice(0,5);

            // all links open in same tab
            const handleLinkClick = (e, url) => {
                e.preventDefault();
                window.location.href = url;
            };

            // about me link
            const handleAboutClick = (e) => {
                e.preventDefault();
                window.location.href = 'https://www.mudasiribrahim.com';
            };

            const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });
            const switchTab = (tab) => {
                setActiveTab(tab);
                setMobileMenuOpen(false);
                scrollToTop();
                setSelectedLetter('');
                setKeyword('');
            };

            const currentYear = new Date().getFullYear();

            const Home = () => (
                <div className="intro-block">
                    <h1>introduction<span>v2</span></h1>
                    <div className="intro-text">

                        <p>All apps are built entirely in <strong>R</strong> using the <strong>Shiny</strong> framework, hosted on <strong>shinyapps.io</strong>. Behind the scenes they rely on the <strong>tidyverse</strong> (dplyr, tidyr, ggplot2), <strong>recipes</strong> for preprocessing, <strong>broom</strong> for tidy outputs, <strong>survival</strong> for KM plots, <strong>psych</strong> for factor analysis, and many more specialised packages. Every tool is open source and free.</p>
                           <p>💡 100% open-source. 100% free. Built for researchers, by a researcher</p>
                        
                    </div>
                    
                    <ul className="feature-list">
                        <li><i className="fas fa-cube"></i> 21 R/Shiny apps + 4 HTML web tools</li>
                        <li><i className="fas fa-code-branch"></i> Backend: R, Shiny, tidyverse, and friends</li>
                        <li><i className="fas fa-cloud-upload-alt"></i> Hosted on shinyapps.io – no installation needed</li>
                        <li><i className="fas fa-heart"></i> Zero cost, forever – because research tools should be accessible</li>
                    </ul>
                    <div className="cta-row">
                        <a href="#" className="mini-link" onClick={(e)=>{ e.preventDefault(); switchTab('software'); }}>
                            <i className="fas fa-arrow-right"></i> explore apps
                        </a>
                    </div>

                    <div className="privacy-note">
                        <i className="fas fa-shield-alt" style={{ marginRight: '0.8rem', color: '#2a5f5a' }}></i>
                        <strong>Your privacy:</strong> This site stores only your theme preference (light/dark mode) locally on your browser. The apps themselves do not collect, store, or share any user data. No tracking, no cookies.
                    </div>

                    <p style={{ fontSize:'0.95rem', opacity:0.7, marginTop:'2rem', fontWeight:500 }}>
                        {shinyApps.length} R/Shiny tools · {totalViews.toLocaleString()} total views
                    </p>
                </div>
            );

            const Software = () => (
                <>
                    <div className="section-header">
                        <h2>R/shiny applications</h2>
                        <div className="stats-badge">
                            <span>{filteredApps.length} apps</span>
                            <span>{totalViews.toLocaleString()} views</span>
                        </div>
                    </div>

                    <div className="filter-row">
                        <div className="keyword-filter">
                            <input 
                                type="text" 
                                placeholder="filter by analysis type (e.g., survival, factor, sample size)..." 
                                value={keyword} 
                                onChange={e => { setKeyword(e.target.value); setSelectedLetter(''); }}
                            />
                        </div>
                        {(selectedLetter || keyword) && (
                            <div className="reset-filter" onClick={() => { setSelectedLetter(''); setKeyword(''); }}>
                                <i className="fas fa-times"></i> clear filters
                            </div>
                        )}
                    </div>

                    {/* A–Z filter – all letters active */}
                    <div className="alphabet-filter">
                        {alphabet.map(letter => {
                            const isActive = selectedLetter === letter;
                            return (
                                <button
                                    key={letter}
                                    className={`letter-btn ${isActive ? 'active' : ''}`}
                                    onClick={() => {
                                        setSelectedLetter(isActive ? '' : letter);
                                        setKeyword('');
                                    }}
                                >
                                    {letter}
                                </button>
                            );
                        })}
                    </div>

                    <div className="apps-grid">
                        {filteredApps.length > 0 ? filteredApps.map(app => (
                            <div key={app.id} className="app-card">
                                <div className="card-header">
                                    <div className="app-logo">
                                        <img src={app.logo} alt={app.name} onError={(e)=> e.target.style.display='none'} />
                                    </div>
                                    <div className="title-views">
                                        <div className="app-name">{app.name}</div>
                                        <div className="view-badge">
                                            <i className="far fa-eye"></i> {app.views.toLocaleString()}
                                        </div>
                                    </div>
                                </div>
                                <p className="app-description">{app.desc}</p>
                                <div className="app-actions">
                                    <a href={app.run} onClick={(e) => handleLinkClick(e, app.run)}><i className="fas fa-play"></i> launch</a>
                                    <a href={app.code} onClick={(e) => handleLinkClick(e, app.code)}><i className="fab fa-github"></i> code</a>
                                </div>
                            </div>
                        )) : (
                            <div className="empty-state">
                                <i className="fas fa-filter" style={{fontSize:'2rem', marginBottom:'1rem', opacity:0.4}}></i>
                                <p>no apps match your criteria</p>
                                <button onClick={()=>{ setSelectedLetter(''); setKeyword(''); }}>clear filters</button>
                            </div>
                        )}
                    </div>

                    {/* HTML section */}
                    <div className="html-section">
                        <div className="section-header" style={{marginTop:'1rem'}}>
                            <h2>HTML web apps</h2>
                            <div className="stats-badge">
                                <span>{htmlApps.length} tools</span>
                            </div>
                        </div>
                        <div className="apps-grid">
                            {htmlApps.map(app => (
                                <div key={app.id} className="app-card html-app-card">
                                    <div className="card-header">
                                        <div className="app-logo">
                                            <i className="fas fa-code" style={{fontSize:'1.8rem', color:'#2a5f5a'}}></i>
                                        </div>
                                        <div className="title-views">
                                            <div className="app-name">{app.name}</div>
                                        </div>
                                    </div>
                                    <p className="app-description">{app.desc}</p>
                                    <div className="app-actions">
                                        <a href={app.url} onClick={(e) => handleLinkClick(e, app.url)}><i className="fas fa-external-link-alt"></i> open</a>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="views-mini">
                        <div style={{marginBottom:'1rem', fontWeight:600}}>most viewed shiny apps</div>
                        <div className="top-views">
                            {topApps.map(a => (
                                <span key={a.id}><i className="fas fa-chart-line"></i> {a.name} {a.views.toLocaleString()}</span>
                            ))}
                        </div>
                        <div style={{marginTop:'1.5rem', fontSize:'0.85rem', opacity:0.6}}>
                            view counts sourced from <a href="https://shinyappstore.com/search/user/1732" target="_blank" rel="noopener" style={{color:'inherit', textDecoration:'underline'}}>shiny app store</a>
                        </div>
                    </div>
                </>
            );

            return (
                <div style={{display:'flex', flexDirection:'column', minHeight:'100vh'}}>
                    <header className="site-header">
                        <div className="container">
                            <div className="header-inner">
                                <div className="logo">
                                    <a href="#" onClick={(e)=>{ e.preventDefault(); switchTab('home'); }}>shinyhealthtools</a>
                                </div>
                                <div className="nav-right">
                                    <ul className="nav-links">
                                        <li><a href="#" onClick={(e)=>{ e.preventDefault(); switchTab('home'); }} className={activeTab==='home'?'active':''}>home</a></li>
                                        <li><a href="#" onClick={(e)=>{ e.preventDefault(); switchTab('software'); }} className={activeTab==='software'?'active':''}>software</a></li>
                                        <li><a href="#" onClick={handleAboutClick} className={activeTab==='about'?'active':''}>about me</a></li>
                                    </ul>
                                    <button className="theme-toggle" onClick={toggleTheme} title={darkMode?'light mode':'dark mode'}>
                                        <i className={darkMode ? 'fas fa-sun' : 'fas fa-moon'}></i>
                                    </button>
                                    <button className="mobile-menu-btn" onClick={()=>setMobileMenuOpen(!mobileMenuOpen)}>
                                        <i className="fas fa-bars"></i>
                                    </button>
                                </div>
                            </div>
                            {mobileMenuOpen && (
                                <div style={{marginTop:'1.2rem', display:'flex', flexDirection:'column', gap:'0.8rem'}}>
                                    <a href="#" onClick={(e)=>{ e.preventDefault(); switchTab('home'); }} style={{color:'inherit', textDecoration:'none', fontSize:'1.1rem', padding:'0.3rem 0'}} onMouseEnter={(e)=>e.target.style.opacity='0.8'} onMouseLeave={(e)=>e.target.style.opacity='1'}>home</a>
                                    <a href="#" onClick={(e)=>{ e.preventDefault(); switchTab('software'); }} style={{color:'inherit', textDecoration:'none', fontSize:'1.1rem', padding:'0.3rem 0'}} onMouseEnter={(e)=>e.target.style.opacity='0.8'} onMouseLeave={(e)=>e.target.style.opacity='1'}>software</a>
                                    <a href="#" onClick={handleAboutClick} style={{color:'inherit', textDecoration:'none', fontSize:'1.1rem', padding:'0.3rem 0'}} onMouseEnter={(e)=>e.target.style.opacity='0.8'} onMouseLeave={(e)=>e.target.style.opacity='1'}>about me</a>
                                </div>
                            )}
                        </div>
                    </header>

                    <main>
                        <div className="container">
                            {activeTab === 'home' ? <Home /> : <Software />}
                        </div>
                    </main>

                    <footer className="site-footer">
                        <div className="container">
                            <div className="footer-inner">
                                <span>Copyright © {currentYear} shinyhealthtools – Mudasir Mohammed Ibrahim</span>
                                <span style={{display:'flex', gap:'1.5rem'}}>
                                    <a href="#" onClick={scrollToTop} style={{color:'inherit', textDecoration:'none'}}>↑ back to top</a>
                                    <a href="https://github.com/mudassiribrahim30" target="_blank" rel="noopener" style={{color:'inherit'}}><i className="fab fa-github"></i></a>
                                </span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.render(<ShinyHealthTools />, document.getElementById('root'));
    </script>
</body>
</html>
