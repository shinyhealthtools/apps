<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>shinyhealthtools – interactive web apps for data analysis</title>
    
    <!-- PRIMARY META DESCRIPTION (highlights both R/Shiny and HTML tools) -->
    <meta name="description" content="Free, intuitive R/Shiny web applications for sample size, ROC curves, survival analysis, factor analysis, data conversion & more. Built for health researchers—no coding required. 10+ interactive tools.">
    
    <!-- KEYWORDS cover both types -->
    <meta name="keywords" content="R Shiny, data analysis, statistical software, sample size calculator, ROC curve, survival analysis, factor analysis, SPSS converter, mediation analysis, health research tools, free statistics apps, online statistical calculators">
    
    <!-- OPEN GRAPH / SOCIAL PREVIEW -->
    <meta property="og:title" content="shinyhealthtools – free interactive data analysis apps (R/Shiny)">
    <meta property="og:description" content="10+ R/Shiny applications for health research: sample size, ROC curves, survival plots, factor analysis, data conversion, and more. No installation, free forever.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://shinyhealthtools.com">
    <meta property="og:image" content="https://raw.githubusercontent.com/mudassiribrahim12/me/main/og-preview.jpg">
    <meta property="og:image:alt" content="shinyhealthtools dashboard preview with R/Shiny apps">
    
    <!-- TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="shinyhealthtools – interactive web apps for data analysis (R/Shiny)">
    <meta name="twitter:description" content="Free R/Shiny apps for sample size, ROC, survival, factor analysis, data conversion & more. Built by a health researcher.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/mudassiribrahim12/me/main/og-preview.jpg">
    
    <!-- fonts & icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        scroll-behavior: smooth;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      body {
        background: #0c0b14;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root {
        width: 100%;
        max-width: 100%;
        border-radius: 0;
        background: rgba(20, 18, 30, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        overflow: hidden;
      }
      /* modal styles – scrolls into view */
      .modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(5px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-content {
        background: #1e1a30;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 2rem;
        padding: 2.5rem;
        max-width: 500px;
        width: 90%;
        color: #eaeefb;
        box-shadow: 0 30px 60px -20px black;
        margin: auto;
      }
      .modal-content h3 {
        font-size: 1.8rem;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #fff, #c0b7ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .modal-content p {
        margin-bottom: 1.5rem;
        line-height: 1.6;
        color: #c7c2e6;
      }
      .modal-close {
        background: rgba(160, 140, 255, 0.2);
        border: 1px solid #9f8eff;
        padding: 0.7rem 1.5rem;
        border-radius: 50px;
        color: white;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.2s;
      }
      .modal-close:hover {
        background: rgba(160, 140, 255, 0.4);
      }
      body.modal-open {
        overflow: hidden;
      }
      /* mobile menu */
      .mobile-menu-btn {
        display: none;
        background: none;
        border: none;
        color: #ddd9ff;
        font-size: 1.8rem;
        cursor: pointer;
        z-index: 30;
      }
      .mobile-menu {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(10, 8, 22, 0.95);
        backdrop-filter: blur(10px);
        padding: 1rem 1.5rem;
        flex-direction: column;
        gap: 0.5rem;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        z-index: 25;
      }
      .mobile-menu a {
        color: #ddd9ff;
        text-decoration: none;
        font-size: 1rem;
        padding: 0.8rem 1rem;
        border-radius: 12px;
        transition: background 0.2s;
        font-weight: 400;
      }
      .mobile-menu a:hover {
        background: rgba(160, 140, 255, 0.15);
      }
      .mobile-menu a i {
        margin-right: 8px;
      }
      
      /* Testimonial carousel */
      .testimonial-carousel {
        position: relative;
        min-height: 250px;
      }
      .testimonial-slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        opacity: 0;
        transition: opacity 0.8s ease-in-out;
        pointer-events: none;
      }
      .testimonial-slide.active {
        opacity: 1;
        position: relative;
        pointer-events: auto;
      }

      /* responsive breakpoints */
      @media (max-width: 700px) {
        body { padding: 0; }
        
        .nav-links {
          display: none !important;
        }
        .mobile-menu-btn {
          display: block !important;
        }
        .mobile-menu.open {
          display: flex !important;
        }
        .navbar {
          flex-wrap: wrap;
          position: relative;
          padding: 1.2rem 1.5rem !important;
        }
        .hero, .showcase, .footer {
          padding-left: 1.5rem !important;
          padding-right: 1.5rem !important;
        }
        .hero { padding-top: 2rem !important; padding-bottom: 3rem !important; }
        .showcase { padding-top: 2rem !important; padding-bottom: 2rem !important; }
        
        .card-grid {
          grid-template-columns: 1fr !important;
          gap: 1.2rem !important;
        }
        .hero-title {
          font-size: clamp(2.2rem, 13vw, 3.2rem) !important;
        }
        .hero-sub {
          font-size: 1rem !important;
          line-height: 1.5 !important;
        }
        .hero-metrics {
          flex-direction: row !important;
          flex-wrap: wrap;
          gap: 1.5rem !important;
        }
        .why-tools-grid {
          grid-template-columns: 1fr !important;
          gap: 1.2rem !important;
        }
        .testimonial-inner {
          padding: 2rem 1.8rem !important;
          border-radius: 2rem !important;
        }
        .quote-text {
          font-size: 1.1rem !important;
          line-height: 1.5 !important;
        }
        .quote-mark {
          font-size: 4rem !important;
        }
        .quote-author {
          font-size: 0.95rem !important;
        }
        .footer {
          padding: 2rem 1.5rem 1.2rem !important;
        }
        .footer-main {
          flex-direction: column !important;
          gap: 1.5rem !important;
          margin-bottom: 2rem !important;
        }
        .footer-links {
          flex-wrap: wrap !important;
          gap: 1.2rem !important;
        }
        .footer-copyright {
          flex-direction: column !important;
          gap: 0.5rem !important;
          text-align: center !important;
        }
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // ---------- ALL APP DATA ----------
      const shinyApps = [
        { id:1, name:"FactorGuard", desc:"A factor-retention decision tool for EFA", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/FactorGuard.png", run:"https://mudassiribrahim2026.shinyapps.io/FactorGuard/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/FactorGuard.R" },
        { id:2, name:"CalcuStats", desc:"Tool for sample size calculation, power analysis, and descriptive statistics", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/CalcuStats.png", run:"https://mudassiribrahim2025.shinyapps.io/CalcuStats/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/CalcuStats.R" },
        { id:3, name:"CATrend Analyzer", desc:"Cochran-Armitage test for trend tool", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/CAtrend.png", run:"https://newappstesting.shinyapps.io/CATrendAnalyzer/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/CATrendAnalyzer.R" },
        { id:4, name:"ROC Curve Builder", desc:"ROC curve analysis and diagnostic test evaluation", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/ROC.png", run:"https://mudassiribrahim30.shinyapps.io/ROC_CURVE/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/ROC%20Curve%20Builder.R" },
        { id:5, name:"Data2SPSS", desc:"Convert datasets to SPSS (.sav) files", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/Data2SPSS.png", run:"https://newappstesting.shinyapps.io/Data2SPSS/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/Data2SPSS" },
        { id:6, name:"MedModr", desc:"Mediation and moderation analysis tool", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/MedModr.png", run:"https://mudassiribrahim30.shinyapps.io/MedModr/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/MedModr.R" },
        { id:7, name:"EpiDem Suite", desc:"Epidemiological data analysis suite", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/EpiDem.png", run:"https://mudassiribrahim2025.shinyapps.io/EpiDemSuite/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/EpiDem%20Suite.R" },
        { id:8, name:"ggPubPlot", desc:"Publication-ready ggplot2 visualizations", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/ggLogo.png", run:"https://mudassiribrahim2025.shinyapps.io/ggPubPlot/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/ggPubPlot.R" },
        { id:9, name:"APA Table Generator", desc:"Generate APA formatted tables", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/APA%20logo.png", run:"https://newappstesting.shinyapps.io/APATableGenerator/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/APA%20Table%20Generator%20Pro.R" },
        { id:10, name:"SysSampler", desc:"Systematic sampling tool", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/Sys%20Sampler.png", run:"https://mudassiribrahim2025b.shinyapps.io/SysSampler/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/SysSampler" },
        { id:11, name:"CMH Analyzer", desc:"Cochran-Mantel-Haenszel analysis", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/CMH.png", run:"https://newappstesting.shinyapps.io/CMHAnalyzer/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/CMHAnalyzer.R" },
        { id:12, name:"TNMTC DataLab", desc:"Comprehensive data analysis", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/TNMTC.png", run:"https://newappstesting.shinyapps.io/NMTCDataLab/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/NMTC%20APP.R" },
        { id:13, name:"PharmaCalc Pro", desc:"Pharmaceutical calculations", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/Pharma.png", run:"https://mudassiribrahim2025b.shinyapps.io/PharmaCalcPro/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/PharmaCalcPro.R" },
        { id:14, name:"RegEffect Xplorer", desc:"Explore regression effects visually", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/RegEf.png", run:"https://mudassiribrahim2025b.shinyapps.io/RegEffectXplorer/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/RegEffectXplorer.R" },
        { id:15, name:"Data TransformR", desc:"Data transformation and preprocessing", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/DataTrans.png", run:"https://mudassiribrahim2025b.shinyapps.io/DataTransformR/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/DataTransformR.R" },
        { id:16, name:"CleanMyData", desc:"Data screening and cleaning", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/CleanMyData.png", run:"https://mudassiribrahim2025b.shinyapps.io/CleanMyData/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/CleanMyData.R" },
        { id:17, name:"KMPlot Genie", desc:"Kaplan-Meier survival plot generator", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/KMPlot.png", run:"https://mudassiribrahim30.shinyapps.io/KMPlotGenie/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/KMPlotGenie.R" },
        { id:18, name:"QuickStatsGen", desc:"Custom Data Generator for education", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/QuickStats.png", run:"https://mudassiribrahim2025.shinyapps.io/QuickStatsGen/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/QuickStatsGen.R" },
        { id:19, name:"Robust Regressor", desc:"Robust regression analysis", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/Robust.png", run:"https://mudassiribrahim2025.shinyapps.io/Robustregression/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/Robust%20%20Regressor.R" },
        { id:20, name:"TagSelect", desc:"Participant selection tool", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/TagSelect.png", run:"https://mudassiribrahim30.shinyapps.io/Tagselect/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/TagSelect.R" },
        { id:21, name:"FAnalyzr", desc:"Factor analysis and dimensionality reduction", logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/FA.png", run:"https://mudassiribrahim30.shinyapps.io/fanalyzr/", code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/FAnalyzr.R" }
      ];

      // Featured apps (6 for home)
      const featuredApps = shinyApps.slice(0, 6);

      // Testimonials data (5 items)
      const testimonials = [
        { id:1, text:"These tools saved me hours of coding. The ROC curve builder and survival plot generator are incredibly intuitive. Perfect for health researchers without a stats background.", role:"health researcher" },
        { id:2, text:"The sample size calculator and power analysis tools are spot-on. I use them for all my research proposals now. Clean interface and reliable results.", role:"clinical researcher" },
        { id:3, text:"Finally, free tools that actually work! The factor analysis app helped me validate my survey instrument in minutes instead of days.", role:"phd candidate" },
        { id:4, text:"I've recommended these tools to my colleagues. The data conversion and SPSS export features are lifesavers.", role:"data analyst" },
        { id:5, text:"The MedModr tool is brilliant. It makes complex statistical concepts accessible and visual.", role:"research methodologist" }
      ];

      // ---------- COMPONENTS ----------
      const FloatingParticles = () => {
        const containerRef = useRef(null);
        useEffect(() => {
          if (!containerRef.current) return;
          const container = containerRef.current;
          container.innerHTML = '';
          const particleCount = 42;
          for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement("span");
            particle.className = "particle";
            const size = Math.random() * 6 + 2;
            particle.style.width = size + "px";
            particle.style.height = size + "px";
            particle.style.left = Math.random() * 100 + "%";
            particle.style.top = Math.random() * 100 + "%";
            particle.style.animationDelay = Math.random() * 8 + "s";
            particle.style.animationDuration = Math.random() * 10 + 12 + "s";
            particle.style.background = `rgba(${160 + Math.random() * 80}, ${180 + Math.random() * 70}, 255, ${Math.random() * 0.3 + 0.1})`;
            particle.style.boxShadow = `0 0 ${Math.random() * 12 + 4}px currentColor`;
            container.appendChild(particle);
          }
        }, []);
        return <div ref={containerRef} className="particle-field" />;
      };

      const Navbar = ({ activeTab, setActiveTab, setShowPrivacy }) => {
        const [scrolled, setScrolled] = useState(false);
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
        
        useEffect(() => {
          const handleScroll = () => setScrolled(window.scrollY > 20);
          window.addEventListener("scroll", handleScroll);
          return () => window.removeEventListener("scroll", handleScroll);
        }, []);
        
        const handleLogoClick = (e) => {
          e.preventDefault();           // stay on same page
          setActiveTab('home');
          setMobileMenuOpen(false);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const handleNavClick = (tab) => {
          setActiveTab(tab);
          setMobileMenuOpen(false);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const handleAboutClick = (e) => {
          e.preventDefault();
          // open in same tab (stay within website tab)
          window.location.href = 'https://www.mudasiribrahim.com';
          setMobileMenuOpen(false);
        };

        return (
          <nav className={`navbar ${scrolled ? "navbar-blur" : ""}`}>
            <div className="nav-logo">
              <a href="#" onClick={handleLogoClick}>
                <span className="logo-glow">✦ shinyhealthtools</span>
              </a>
            </div>
            
            {/* Desktop Navigation - no theme toggle */}
            <div className="nav-links">
              <a href="#" onClick={(e) => { e.preventDefault(); handleNavClick('home'); }}>home</a>
              <a href="#" onClick={(e) => { e.preventDefault(); handleNavClick('apps'); }}>apps</a>
              <a href="#" onClick={handleAboutClick}>about me</a>
            </div>

            <button className="mobile-menu-btn" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
              <i className={`fas fa-${mobileMenuOpen ? 'times' : 'bars'}`}></i>
            </button>

            <div className={`mobile-menu ${mobileMenuOpen ? 'open' : ''}`}>
              <a href="#" onClick={(e) => { e.preventDefault(); handleNavClick('home'); }}>home</a>
              <a href="#" onClick={(e) => { e.preventDefault(); handleNavClick('apps'); }}>apps</a>
              <a href="#" onClick={handleAboutClick}>about me</a>
            </div>
          </nav>
        );
      };

      const PrivacyModal = ({ onClose }) => {
        const modalRef = useRef(null);
        useEffect(() => {
          document.body.classList.add('modal-open');
          // Scroll the modal into view smoothly after it mounts
          if (modalRef.current) {
            setTimeout(() => {
              modalRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
          }
          return () => document.body.classList.remove('modal-open');
        }, []);

        return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content" ref={modalRef} onClick={e => e.stopPropagation()}>
              <h3>🔒 privacy notice</h3>
              <p>The apps do not collect, store, or share any user data. No tracking, no cookies. Your data stays on your device.</p>
              <button className="modal-close" onClick={onClose}>close</button>
            </div>
          </div>
        );
      };

      const TestimonialCarousel = () => {
        const [activeIndex, setActiveIndex] = useState(0);
        useEffect(() => {
          const interval = setInterval(() => {
            setActiveIndex((current) => (current + 1) % testimonials.length);
          }, 5000);
          return () => clearInterval(interval);
        }, []);
        return (
          <section className="testimonial">
            <div className="testimonial-inner">
              <span className="quote-mark">"</span>
              <div className="testimonial-carousel">
                {testimonials.map((testimonial, index) => (
                  <div key={testimonial.id} className={`testimonial-slide ${index === activeIndex ? 'active' : ''}`}>
                    <p className="quote-text">{testimonial.text}</p>
                    <div className="quote-author">
                      <div className="author-avatar" />
                      <div><span>{testimonial.role}</span></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      };

      const Home = ({ setActiveTab }) => {
        const featuredRefs = useRef([]);
        const whyToolsRefs = useRef([]);
        
        if (featuredRefs.current.length !== featuredApps.length) {
          featuredRefs.current = Array(featuredApps.length).fill().map((_, i) => featuredRefs.current[i] || React.createRef());
        }
        if (whyToolsRefs.current.length !== 4) {
          whyToolsRefs.current = Array(4).fill().map((_, i) => whyToolsRefs.current[i] || React.createRef());
        }

        useEffect(() => {
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  entry.target.style.opacity = '1';
                  entry.target.style.transform = 'translateY(0)';
                }
              });
            },
            { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
          );
          
          featuredRefs.current.forEach(ref => { if (ref.current) observer.observe(ref.current); });
          whyToolsRefs.current.forEach(ref => { if (ref.current) observer.observe(ref.current); });
          
          return () => observer.disconnect();
        }, []);

        const whyToolsData = [
          { icon:"fas fa-flask", title:"built for research", desc:"Every tool addresses a real need in health data analysis: sample size justification, ROC curves, survival plots, factor analysis, and more." },
          { icon:"fas fa-code-branch", title:"100% open source", desc:"All code is available on GitHub. Built with R, Shiny, tidyverse, survival, psych, and more. Inspect, modify, or adapt them to your needs—no restrictions." },
          { icon:"fas fa-cloud-upload-alt", title:"no installation", desc:"Hosted on shinyapps.io. Just click and run in your browser. No R setup, no packages to install—works on any device." },
          { icon:"fas fa-heart", title:"forever free", desc:"No paywalls, no subscriptions. Research tools should be accessible to everyone, everywhere." }
        ];

        return (
          <>
            <section className="hero">
              <div className="hero-badge">✨ R/Shiny • free • open source</div>
              <h1 className="hero-title">
                <span className="title-line">interactive web apps</span>
                <span className="title-line"><span className="gradient-text">for health research</span></span>
              </h1>
              <p className="hero-sub">
                Free, intuitive applications for sample size, ROC curves, survival analysis, factor analysis, 
                data conversion and more. Web tools built by a researcher for researchers—no coding required.
              </p>
              <div className="hero-metrics">
                <div className="metric-item"><span className="metric-number">10+</span><span className="metric-label">R/Shiny tools</span></div>
                <div className="metric-item"><span className="metric-number">100%</span><span className="metric-label">open source</span></div>
                <div className="metric-item"><span className="metric-number">∞</span><span className="metric-label">free forever</span></div>
              </div>
            </section>

            <section className="showcase" style={{ paddingTop: '1rem' }}>
              <h2 className="showcase-title"><span>/ / </span> featured applications</h2>
              <div className="card-grid" style={{ gridTemplateColumns: 'repeat(3, 1fr)' }}>
                {featuredApps.map((app, index) => (
                  <div key={app.id} ref={featuredRefs.current[index]} style={{ opacity:0, transform:'translateY(30px)', transition:'opacity 0.8s cubic-bezier(0.2, 0.9, 0.3, 1), transform 0.8s cubic-bezier(0.2, 0.9, 0.3, 1)', transitionDelay:`${index * 0.15}s` }}>
                    <AppCard app={app} />
                  </div>
                ))}
              </div>
            </section>

            <section className="showcase" style={{ paddingTop: 0 }}>
              <h2 className="showcase-title"><span>/ / </span> why these tools?</h2>
              <div className="why-tools-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '2rem', marginTop: '1rem' }}>
                {whyToolsData.map((tool, index) => (
                  <div key={index} ref={whyToolsRefs.current[index]} style={{ opacity:0, transform:'translateY(30px)', transition:'opacity 0.8s cubic-bezier(0.2, 0.9, 0.3, 1), transform 0.8s cubic-bezier(0.2, 0.9, 0.3, 1)', transitionDelay:`${index * 0.15}s` }}>
                    <div className="card" style={{ background: 'rgba(30,26,48,0.6)', padding: '2rem', height: '100%' }}>
                      <i className={tool.icon} style={{ fontSize: '2.5rem', color: '#a388ff', marginBottom: '1rem' }}></i>
                      <h3 style={{ fontSize: '1.5rem', marginBottom: '1rem' }}>{tool.title}</h3>
                      <p style={{ color: '#b1a9da' }}>{tool.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
            </section>
            <TestimonialCarousel />
          </>
        );
      };

      const AppCard = ({ app }) => {
        const [imgLoaded, setImgLoaded] = useState(false);
        
        // Use normal links that open in same tab (default behavior for <a> with target="_self")
        // We remove target="_blank" so they open in the same website tab as requested.
        return (
          <div className="card" style={{ animationDelay: '0s', height: '100%' }}>
            <div className="card-glow" />
            <div className="card-content">
              <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginBottom: '1rem' }}>
                {app.logo ? (
                  <img src={app.logo} alt={app.name} style={{ width: '48px', height: '48px', borderRadius: '12px', objectFit: 'contain', background: '#fff', opacity: imgLoaded ? 1 : 0.6 }} onLoad={() => setImgLoaded(true)} />
                ) : (
                  <div style={{ width: '48px', height: '48px', borderRadius: '12px', background: '#2a2a4a', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <i className="fas fa-cube" style={{ fontSize: '1.5rem', color: '#a99cff' }}></i>
                  </div>
                )}
                <h3 style={{ fontSize: '1.4rem', margin: 0 }}>{app.name}</h3>
              </div>
              <p style={{ color: '#b1a9da', fontSize: '0.95rem', marginBottom: '1.5rem', minHeight: '60px' }}>{app.desc}</p>
              <div className="card-footer" style={{ borderTop: '1px dashed rgba(255,255,255,0.1)', paddingTop: '1rem', display: 'flex', justifyContent: 'space-between' }}>
                {/* REMOVED target="_blank" so links open in same tab */}
                <a href={app.run} style={{ color: '#cbc3ff', textDecoration: 'none', display: 'flex', alignItems: 'center', gap: '0.3rem' }}><i className="fas fa-play"></i> launch</a>
                <a href={app.code} style={{ color: '#cbc3ff', textDecoration: 'none', display: 'flex', alignItems: 'center', gap: '0.3rem' }}><i className="fab fa-github"></i> code</a>
              </div>
            </div>
          </div>
        );
      };

      const AppsTab = () => {
        const appRefs = useRef([]);
        if (appRefs.current.length !== shinyApps.length) {
          appRefs.current = Array(shinyApps.length).fill().map((_, i) => appRefs.current[i] || React.createRef());
        }

        useEffect(() => {
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  entry.target.style.opacity = '1';
                  entry.target.style.transform = 'translateY(0)';
                }
              });
            },
            { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
          );
          
          appRefs.current.forEach(ref => { if (ref.current) observer.observe(ref.current); });
          return () => observer.disconnect();
        }, []);

        return (
          <section className="showcase">
            <h2 className="showcase-title"><span>/ / </span> all R/Shiny applications (21 tools)</h2>
            <div className="card-grid" style={{ gridTemplateColumns: 'repeat(3, 1fr)' }}>
              {shinyApps.map((app, index) => (
                <div key={app.id} ref={appRefs.current[index]} style={{ opacity:0, transform:'translateY(30px)', transition:'opacity 0.8s cubic-bezier(0.2, 0.9, 0.3, 1), transform 0.8s cubic-bezier(0.2, 0.9, 0.3, 1)', transitionDelay:`${index * 0.05}s` }}>
                  <AppCard app={app} />
                </div>
              ))}
            </div>
          </section>
        );
      };

      const Footer = ({ setShowPrivacy }) => {
        const currentYear = new Date().getFullYear();
        return (
          <footer className="footer">
            <div className="footer-main">
              <div className="footer-brand">
                <span className="logo-glow">✦ shinyhealthtools</span>
                <p>free tools for health research</p>
              </div>
              <div className="footer-links">
                <a href="#" onClick={(e) => { e.preventDefault(); setShowPrivacy(true); }}>privacy</a>
                <a href="#" onClick={(e) => { e.preventDefault(); window.location.href = 'https://github.com/mudassiribrahim30'; }}>github</a>
                <a href="#" onClick={(e) => { e.preventDefault(); window.location.href = 'https://buymeacoffee.com/mudasiribrahim30'; }}><i className="fas fa-coffee"></i> buy me a coffee</a>
              </div>
            </div>
            <div className="footer-copyright">
              <span>Copyright © 2025-{currentYear} shinyhealthtools</span>
              <span className="footer-extra">open source • forever free</span>
            </div>
          </footer>
        );
      };

      // Main App
      const App = () => {
        const [activeTab, setActiveTab] = useState('home');
        const [showPrivacy, setShowPrivacy] = useState(false);

        useEffect(() => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }, [activeTab]);

        return (
          <div className="app-container">
            <FloatingParticles />
            <Navbar activeTab={activeTab} setActiveTab={setActiveTab} setShowPrivacy={setShowPrivacy} />
            <main style={{ position: 'relative', zIndex: 5 }}>
              {activeTab === 'home' && <Home setActiveTab={setActiveTab} />}
              {activeTab === 'apps' && <AppsTab />}
            </main>
            <Footer setShowPrivacy={setShowPrivacy} />
            {showPrivacy && <PrivacyModal onClose={() => setShowPrivacy(false)} />}

            <style>{`
              .app-container {
                position: relative;
                background: radial-gradient(circle at 30% 20%, #1e1a36, #0a0814 80%);
                color: #eaeefb;
                overflow: hidden;
                isolation: isolate;
              }
              .particle-field {
                position: absolute;
                inset: 0;
                pointer-events: none;
                z-index: 0;
              }
              .particle {
                position: absolute;
                border-radius: 50%;
                background: rgba(180, 190, 255, 0.4);
                filter: blur(0.6px);
                animation: floatParticle 18s infinite alternate ease-in-out;
                opacity: 0.6;
                color: #a8bfff;
                will-change: transform;
              }
              @keyframes floatParticle {
                0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
                50% { transform: translate(20px, -25px) scale(1.5); opacity: 0.5; }
                100% { transform: translate(-15px, 30px) scale(0.8); opacity: 0.3; }
              }
              .navbar {
                position: sticky;
                top: 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 1.6rem 3rem;
                z-index: 20;
                transition: background 0.2s, backdrop-filter 0.2s;
              }
              .navbar-blur {
                background: rgba(10, 8, 22, 0.7);
                backdrop-filter: blur(8px);
                border-bottom: 1px solid rgba(255,255,255,0.05);
              }
              .nav-logo {
                font-weight: 600;
                font-size: 1.6rem;
                letter-spacing: -0.02em;
              }
              .nav-logo a {
                color: inherit;

              }
              .logo-glow {
                background: linear-gradient(135deg, #fff, #c0b7ff);

                text-shadow: 0 0 12px rgba(160, 140, 255, 0.6);
              }
              .nav-links {
                display: flex;
                gap: 2rem;
                align-items: center;
              }
              .nav-links a {
                text-decoration: none;
                color: #ddd9ff;
                font-weight: 400;
                font-size: 1rem;
                letter-spacing: 0.3px;
                transition: color 0.2s, text-shadow 0.2s;
              }
              .nav-links a:hover {
                color: white;
                text-shadow: 0 0 8px #a99cff;
              }
              .hero {
                padding: 3rem 4rem 5rem 4rem;
                position: relative;
                z-index: 5;
                max-width: 900px;
              }
              .hero-badge {
                display: inline-block;
                background: rgba(150, 130, 255, 0.1);
                backdrop-filter: blur(4px);
                border-radius: 50px;
                padding: 0.4rem 1.2rem;
                margin-bottom: 2rem;
                font-size: 0.85rem;
                border: 1px solid rgba(255,215,255,0.15);
                color: #cdc5ff;
                animation: fadeSlideUp 0.8s ease-out;
              }
              .hero-title {
                font-size: clamp(3rem, 8vw, 5.2rem);
                font-weight: 600;
                line-height: 1.1;
                letter-spacing: -0.02em;
                margin-bottom: 1.8rem;
              }
              .title-line {
                display: block;
                animation: slideUp 0.7s ease-out;
                animation-fill-mode: both;
              }
              .title-line:nth-child(1) { animation-delay: 0.1s; }
              .title-line:nth-child(2) { animation-delay: 0.2s; }
              .gradient-text {
                background: linear-gradient(120deg, #b9adff, #a3d0ff, #c3b2ff);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                text-shadow: 0 0 20px #9d8cff;
              }
              .hero-sub {
                font-size: 1.3rem;
                max-width: 600px;
                color: #c7c2e6;
                margin-bottom: 2.5rem;
                animation: fadeSlideUp 0.9s 0.2s ease-out both;
                line-height: 1.5;
              }
              .hero-metrics {
                display: flex;
                gap: 3rem;
                animation: fadeSlideUp 1s 0.4s both;
              }
              .metric-item {
                display: flex;
                flex-direction: column;
              }
              .metric-number {
                font-size: 2rem;
                font-weight: 500;
                background: linear-gradient(135deg, #fff, #d4cbff);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
              }
              .metric-label {
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #9990cc;
              }
              .showcase {
                padding: 3rem 4rem;
                z-index: 5;
                position: relative;
              }
              .showcase-title {
                font-size: 1.2rem;
                font-weight: 400;
                text-transform: uppercase;
                letter-spacing: 3px;
                color: #a79dcf;
                margin-bottom: 2.5rem;
              }
              .card-grid {
                display: grid;
                gap: 1.8rem;
              }
              .card {
                background: rgba(30, 26, 48, 0.6);
                backdrop-filter: blur(8px);
                border-radius: 2rem;
                border: 1px solid rgba(255,255,255,0.03);
                padding: 1.8rem 1.5rem;
                transition: transform 0.2s, border-color 0.3s;
                position: relative;
                overflow: hidden;
                box-shadow: 0 15px 30px -20px black;
              }
              .card:hover {
                border-color: #7f9cf5;
                transform: translateY(-6px) scale(1.01);
              }
              .card-glow {
                position: absolute;
                inset: 0;
                background: radial-gradient(circle at 50% 0%, #7f9cf5, transparent 70%);
                opacity: 0;
                transition: opacity 0.4s;
                pointer-events: none;
              }
              .card:hover .card-glow {
                opacity: 0.25;
              }
              .card-content {
                position: relative;
                z-index: 2;
              }
              .card-footer a:hover {
                color: white;
                text-shadow: 0 0 8px #a99cff;
              }
              .testimonial {
                padding: 4rem 4rem 5rem;
                position: relative;
              }
              .testimonial-inner {
                background: rgba(40, 30, 64, 0.4);
                backdrop-filter: blur(8px);
                border-radius: 3rem;
                padding: 3.5rem 4rem;
                border: 1px solid rgba(215, 195, 255, 0.1);

                animation: appear 1s ease-out;
              }
              .quote-mark {
                font-size: 6rem;
                line-height: 0.7;

                opacity: 0.4;
                font-family: serif;
              }
              .quote-text {
                font-size: 1.8rem;
                font-weight: 300;
                margin-bottom: 2rem;
                color: #f0eaff;
              }
              .quote-author {
                display: flex;
                align-items: center;
                gap: 1.2rem;
              }
              .author-avatar {
                width: 48px;
                height: 48px;
                background: linear-gradient(145deg, #a388ff, #6d4fcf);
                border-radius: 50%;
                box-shadow: 0 0 0 2px rgba(255,255,255,0.2);
              }
              .footer {
                padding: 2.5rem 4rem 1.5rem;
                border-top: 1px solid rgba(255,255,255,0.02);
                background: rgba(0,0,0,0.2);
                position: relative;
                z-index: 5;
              }
              .footer-main {
                display: flex;
                justify-content: space-between;
                flex-wrap: wrap;
                margin-bottom: 3rem;
              }
              .footer-brand p {
                color: #a69cc9;
                margin-top: 0.5rem;
              }
              .footer-links {
                display: flex;
                gap: 2.5rem;
              }
              .footer-links a {
                text-decoration: none;
                color: #cfc6ff;
              }
              .footer-copyright {
                display: flex;
                justify-content: space-between;
                color: #736b99;
                font-size: 0.85rem;
                border-top: 1px solid rgba(255,255,255,0.02);
                padding-top: 1.5rem;
              }
              @keyframes fadeSlideUp {
                0% { opacity: 0; transform: translateY(20px); }
                100% { opacity: 1; transform: translateY(0); }
              }
              @keyframes slideUp {
                0% { opacity: 0; transform: translateY(60px); }
                100% { opacity: 1; transform: translateY(0); }
              }
              @keyframes appear {
                0% { opacity: 0; }
                100% { opacity: 1; }

          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
</body>
