  <style>
    /* ── LIGHT MODE (DEFAULT) ── */
    :root {
      --bg:       #f4f7fb;
      --bg2:      #edf1f7;
      --bg3:      #ffffff;
      --accent:   #0077cc;
      --accent2:  #005fa3;
      --green:    #00a855;
      --purple:   #6c3fc5;
      --text:     #0f1f33;
      --muted:    #4a6070;
      --muted2:   #93a8b8;
      --border:   rgba(0,119,204,0.15);
      --border2:  rgba(0,0,0,0.08);
      --card-bg:  rgba(255,255,255,0.97);
      --radius:   6px;
      --mono:     'Space Mono', monospace;
      --sans:     'Outfit', sans-serif;
      --nav-bg:   rgba(244,247,251,0.90);
      --nav-bg-scrolled: rgba(244,247,251,0.98);
      --nav-border: rgba(0,119,204,0.12);
      --nav-text: #0f1f33;
      --nav-logo-text: #0f1f33;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-hover: 0 12px 40px rgba(0,0,0,0.14);
    }
    html.dark {
      --bg:       #060a0f;
      --bg2:      #0a1018;
      --bg3:      #0e1620;
      --accent:   #00d4ff;
      --accent2:  #0099cc;
      --green:    #00e87a;
      --purple:   #7c5cfc;
      --text:     #e8edf3;
      --muted:    #7a9aaa;
      --muted2:   #3a5060;
      --border:   rgba(0,212,255,0.12);
      --border2:  rgba(255,255,255,0.06);
      --card-bg:  rgba(10,16,24,0.95);
      --nav-bg:   rgba(6,10,15,0.88);
      --nav-bg-scrolled: rgba(6,10,15,0.98);
      --nav-border: rgba(0,212,255,0.10);
      --nav-text: #e8edf3;
      --nav-logo-text: #e8edf3;
      --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-hover: 0 16px 52px rgba(0,0,0,0.55);
    }

    /* ── RESET ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; font-size:17px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }
    body.modal-open { overflow: hidden; }
    a { color: var(--accent); text-decoration: none; }

    /* ── GRID BACKGROUND ── */
    .light body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,119,204,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,119,204,0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }
    .dark body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    /* ── NAVBAR ── always consistent ── */
    .navbar {
      position: fixed; top:0; left:0; right:0; z-index: 900;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 3.5rem; height: 66px;
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--nav-border);
      transition: background 0.3s, border-color 0.3s;
    }
    .navbar.scrolled { background: var(--nav-bg-scrolled); }

    .nav-logo {
      display: flex; align-items: center; gap: 0.7rem;
      cursor: pointer; text-decoration: none; flex-shrink: 0;
    }
    .nav-logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 0.9rem; flex-shrink: 0;
    }
    .nav-logo-text {
      font-family: var(--mono);
      font-size: 0.92rem;
      color: var(--nav-logo-text);
      letter-spacing: 0.04em;
      font-weight: 700;
      white-space: nowrap;
    }
    .nav-logo-text span { color: var(--accent); }

    .nav-links { display: flex; align-items: center; gap: 0.15rem; }
    .nav-link {
      background: none; border: none;
      font-family: var(--mono); font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--muted); padding: 0.5rem 0.8rem; border-radius: 4px;
      cursor: pointer; transition: color 0.2s, background 0.2s;
      text-decoration: none; display: inline-block; white-space: nowrap;
    }
    .nav-link:hover, .nav-link.active { color: var(--accent); background: rgba(0,119,204,0.08); }
    html.dark .nav-link:hover, html.dark .nav-link.active { background: rgba(0,212,255,0.08); }
    .nav-link-gh {
      background: transparent;
      border: 1.5px solid var(--border);
      font-family: var(--mono); font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--accent); padding: 0.44rem 0.9rem; border-radius: 4px;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.4rem; margin-left: 0.4rem;
      white-space: nowrap;
    }
    .nav-link-gh:hover { background: var(--accent); color: #fff; text-decoration: none; border-color: var(--accent); }
    .nav-search-btn {
      background: none; border: none;
      color: var(--muted); font-size: 0.95rem; padding: 0.5rem 0.6rem;
      border-radius: 4px; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; margin-left: 0.2rem;
    }
    .nav-search-btn:hover { color: var(--accent); background: rgba(0,119,204,0.08); }
    html.dark .nav-search-btn:hover { background: rgba(0,212,255,0.08); }

    /* ── MOBILE NAV ── */
    .mobile-btn {
      display: none; background: none; border: none;
      color: var(--text); font-size: 1.2rem; cursor: pointer; padding: 0.4rem;
      border-radius: 4px; transition: color 0.2s;
    }
    .mobile-btn:hover { color: var(--accent); }
    .mobile-nav {
      display: none;
      background: var(--nav-bg-scrolled);
      border-bottom: 1px solid var(--nav-border);
      padding: 0.75rem 1.5rem 1rem;
      flex-direction: column; gap: 0.15rem;
      position: fixed; top: 66px; left: 0; right: 0; z-index: 899;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav .nav-link { color: var(--text); padding: 0.65rem 0.8rem; font-size: 0.8rem; }
    .mobile-nav .nav-link:hover { color: var(--accent); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 9rem 3.5rem 5rem;
      position: relative; overflow: hidden;
    }
    .hero-orb1 {
      position: absolute; top: -15%; right: -8%;
      width: 800px; height: 800px;
      background: radial-gradient(ellipse, rgba(108,63,197,0.1) 0%, transparent 65%);
      pointer-events: none; z-index: 1;
      animation: orbDrift 14s ease-in-out infinite alternate;
    }
    html.dark .hero-orb1 { background: radial-gradient(ellipse, rgba(124,92,252,0.13) 0%, transparent 65%); }
    .hero-orb2 {
      position: absolute; bottom: -5%; left: 5%;
      width: 550px; height: 550px;
      background: radial-gradient(ellipse, rgba(0,119,204,0.08) 0%, transparent 65%);
      pointer-events: none; z-index: 1;
      animation: orbDrift 18s ease-in-out infinite alternate-reverse;
    }
    html.dark .hero-orb2 { background: radial-gradient(ellipse, rgba(0,212,255,0.07) 0%, transparent 65%); }
    @keyframes orbDrift { 0%{transform:translate(0,0)} 100%{transform:translate(30px,-30px)} }

    .hero-inner {
      max-width: 1240px; margin: 0 auto; width: 100%;
      display: flex; gap: 5rem; align-items: center;
      position: relative; z-index: 2;
    }
    .hero-left { flex: 1.2; }
    .hero-right { flex: 0.9; }

    .hero-tag {
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-family: var(--mono); font-size: 0.75rem;
      color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase;
      margin-bottom: 1.6rem;
      opacity: 0; animation: fadeSlideUp 0.7s ease 0.2s forwards;
    }
    .hero-tag::before {
      content: ''; display: inline-block;
      width: 28px; height: 1.5px; background: var(--accent);
    }
    .tag-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink:0; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1; transform:scale(1)} 50%{opacity:0.5; transform:scale(0.85)} }

    .hero-title {
      font-size: clamp(2.8rem, 5.5vw, 5.2rem);
      font-weight: 900; line-height: 1.0;
      letter-spacing: -0.03em; margin-bottom: 1.5rem;
      color: var(--text);
      opacity: 0; animation: fadeSlideUp 0.7s ease 0.4s forwards;
    }
    .hero-title em {
      font-style: normal; color: var(--accent); position: relative;
    }
    .hero-title em::after {
      content: '';
      position: absolute; bottom: 2px; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .hero-desc {
      font-size: 1.05rem; color: var(--muted); line-height: 1.85;
      max-width: 560px; margin-bottom: 0.7rem;
      font-weight: 400;
      opacity: 0; animation: fadeSlideUp 0.7s ease 0.6s forwards;
    }

    .hero-actions {
      display: flex; gap: 0.9rem; margin-top: 2rem; flex-wrap: wrap;
      opacity: 0; animation: fadeSlideUp 0.7s ease 0.8s forwards;
    }
    .btn-primary {
      background: var(--accent); color: #fff;
      border: none; font-family: var(--sans); font-size: 0.93rem; font-weight: 700;
      letter-spacing: 0.04em; padding: 0.82rem 1.8rem; border-radius: 4px;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 35px rgba(0,119,204,0.3); color: #fff; text-decoration: none; }
    html.dark .btn-primary:hover { box-shadow: 0 10px 35px rgba(0,212,255,0.28); }
    .btn-outline {
      background: transparent; color: var(--text);
      border: 1.5px solid var(--border2);
      font-family: var(--sans); font-size: 0.93rem; font-weight: 600;
      padding: 0.82rem 1.7rem; border-radius: 4px;
      cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s;
      display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none;
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,119,204,0.05); text-decoration: none; }

    .hero-metrics {
      display: flex; gap: 3rem;
      margin-top: 3rem; padding-top: 2.5rem;
      border-top: 1.5px solid var(--border);
      opacity: 0; animation: fadeSlideUp 0.7s ease 1.0s forwards;
      flex-wrap: wrap;
    }
    .metric-n { font-family: var(--mono); font-size: 2.4rem; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 0.35rem; }
    .metric-l { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; }

    /* ── CODE BOX ── */
    .code-box {
      background: #1a1f2e;
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,212,255,0.05);
      opacity: 0; animation: fadeSlideLeft 0.8s ease 0.5s forwards;
    }
    @keyframes fadeSlideLeft { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
    .code-hdr {
      background: #141920;
      padding: 0.75rem 1.15rem;
      display: flex; align-items: center; gap: 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .cdot { width: 11px; height: 11px; border-radius: 50%; }
    .cdot-r { background: #ff5f57; } .cdot-y { background: #febc2e; } .cdot-g { background: #28c840; }
    .code-fname { font-family: var(--mono); font-size: 0.7rem; color: #6a8090; margin-left: 0.5rem; }
    .code-body {
      padding: 1.4rem 1.6rem;
      font-family: var(--mono); font-size: 0.78rem;
      line-height: 1.95; color: #8899aa; overflow: hidden;
    }
    .code-line { display: block; min-height: 1.95em; }
    .ck { color: #bd93f9; } .cf { color: #69b8f7; } .cs { color: #7ec99a; }
    .cc { color: #4a6070; font-style: italic; } .cn { color: #d19a66; } .cv { color: #e06c75; }
    .cursor { display: inline-block; width: 2px; height: 0.95em; background: #00d4ff; vertical-align: middle; margin-left: 1px; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── SECTION BASE ── */
    .section { padding: 6rem 3.5rem; position: relative; z-index: 2; }
    .section-inner { max-width: 1240px; margin: 0 auto; }
    .section-alt { background: var(--bg2); }

    .section-hdr { margin-bottom: 3.5rem; }
    .section-tag-label {
      font-family: var(--mono); font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.22em; color: var(--accent);
      margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.6rem;
    }
    .section-tag-label::before { content: '//'; opacity: 0.6; }
    .section-title {
      font-size: clamp(1.9rem, 3.5vw, 2.9rem); font-weight: 800;
      letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 0.8rem;
      color: var(--text);
    }
    .section-sub { font-size: 1.0rem; color: var(--muted); max-width: 520px; line-height: 1.8; font-weight: 400; }

    /* ── APP CARDS ── */
    .card-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.35rem; }

    .app-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border2);
      border-radius: 6px;
      overflow: hidden;
      transition: transform 0.28s, border-color 0.28s, box-shadow 0.28s;
      position: relative;
      box-shadow: var(--shadow-card);
      /* Cards are always visible — no fade-up class needed for filter grids */
    }
    .app-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .app-card:hover { transform: translateY(-5px); border-color: rgba(0,119,204,0.25); box-shadow: var(--shadow-hover); }
    html.dark .app-card:hover { border-color: rgba(0,212,255,0.2); }
    .app-card:hover::before { opacity: 1; }

    /* Fade-in only used for hero/home section cards */
    .app-card.fade-up {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s ease, transform 0.7s ease, border-color 0.28s, box-shadow 0.28s;
    }
    .app-card.fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .app-card-top { display: flex; align-items: center; gap: 0.9rem; padding: 1.4rem 1.4rem 0.6rem; }
    .app-logo {
      width: 48px; height: 48px; border-radius: 9px;
      object-fit: contain; background: var(--bg2); flex-shrink: 0;
      display: block;
    }
    .app-logo-fb {
      width: 48px; height: 48px; border-radius: 9px;
      background: rgba(0,119,204,0.08); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 1.15rem; flex-shrink: 0;
    }
    .app-name { font-size: 0.98rem; font-weight: 700; color: var(--text); letter-spacing: -0.01em; line-height: 1.3; }
    .app-desc {
      font-size: 0.87rem; color: var(--muted); line-height: 1.7;
      padding: 0 1.4rem; margin-bottom: 1.1rem;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .app-footer { display: flex; gap: 0.85rem; padding: 0.9rem 1.4rem; border-top: 1px solid var(--border2); }
    .app-link {
      font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.08em;
      color: var(--accent); text-decoration: none;
      display: flex; align-items: center; gap: 0.38rem;
      transition: gap 0.2s, color 0.2s; text-transform: uppercase; font-weight: 700;
    }
    .app-link:hover { gap: 0.65rem; color: var(--accent2); text-decoration: none; }
    .app-link-src { color: var(--muted); }
    .app-link-src:hover { color: var(--text); }

    /* ── FILTER BAR ── */
    .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 2.5rem; flex-wrap: wrap; }
    .filter-btn {
      font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.48rem 1.1rem; border-radius: 4px;
      border: 1.5px solid var(--border2); background: var(--card-bg); color: var(--muted);
      cursor: pointer; transition: all 0.2s; font-weight: 700;
    }
    .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,119,204,0.06); }
    html.dark .filter-btn.active, html.dark .filter-btn:hover { background: rgba(0,212,255,0.06); }

    /* ── WHY SECTION ── */
    .why-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1.35rem; }
    .why-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border2);
      border-radius: 6px; padding: 2rem;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      position: relative; overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .why-card::after { content: ''; position: absolute; bottom: -1px; left: 2rem; right: 2rem; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0; transition: opacity 0.3s; }
    .why-card:hover { transform: translateY(-3px); border-color: rgba(0,119,204,0.2); box-shadow: var(--shadow-hover); }
    html.dark .why-card:hover { border-color: rgba(0,212,255,0.18); }
    .why-card:hover::after { opacity: 1; }
    .why-icon { width: 44px; height: 44px; background: rgba(0,119,204,0.08); border: 1.5px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 1.05rem; margin-bottom: 1.1rem; }
    .why-title { font-size: 1.0rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
    .why-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.75; }

    /* ── TESTIMONIALS ── */
    .testi-section {
      background: var(--bg2);
      padding: 6rem 3.5rem;
      position: relative; z-index: 2; overflow: hidden;
    }
    .testi-section::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(108,63,197,0.04) 0%, transparent 50%, rgba(0,119,204,0.04) 100%);
      pointer-events: none;
    }
    html.dark .testi-section::before { background: linear-gradient(135deg, rgba(124,92,252,0.04) 0%, transparent 50%, rgba(0,212,255,0.04) 100%); }
    .testi-inner { max-width: 800px; margin: 0 auto; text-align: center; position: relative; z-index: 1; }
    .testi-label { font-family: var(--mono); font-size: 0.74rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 2.5rem; font-weight: 700; }
    .testi-quote {
      font-size: clamp(1.05rem, 2vw, 1.22rem); font-weight: 500;
      color: var(--text);
      line-height: 1.85; margin-bottom: 1.75rem;
      transition: opacity 0.4s; position: relative;
      padding: 0 2rem;
    }
    .testi-quote::before {
      content: '\201C'; font-size: 5.5rem; line-height: 0;
      color: var(--accent); opacity: 0.15;
      position: absolute; top: 0.8rem; left: -1rem;
      font-family: Georgia,serif;
    }
    .testi-author { font-family: var(--mono); font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; }
    .testi-dots { display: flex; justify-content: center; gap: 0.55rem; margin-top: 2rem; }
    .tdot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted2); cursor: pointer; transition: all 0.3s; }
    .tdot.on { background: var(--accent); width: 22px; border-radius: 4px; }

    /* ── BLOG ── */
    .blog-layout { display: flex; gap: 2.5rem; align-items: flex-start; }
    .blog-main { flex: 1; min-width: 0; }
    .blog-sidebar { width: 230px; flex-shrink: 0; position: sticky; top: 82px; }
    .sidebar-panel { background: var(--card-bg); border: 1.5px solid var(--border2); border-radius: 6px; overflow: hidden; box-shadow: var(--shadow-card); }
    .sp-header { padding: 0.9rem 1.1rem; border-bottom: 1px solid var(--border2); font-family: var(--mono); font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
    .archive-btn { width: 100%; text-align: left; background: none; border: none; border-bottom: 1px solid var(--border2); padding: 0.65rem 1.1rem; font-family: var(--mono); font-size: 0.77rem; color: var(--muted); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
    .archive-btn:last-child { border-bottom: none; }
    .archive-btn:hover { background: rgba(0,119,204,0.05); color: var(--text); }
    html.dark .archive-btn:hover { background: rgba(0,212,255,0.04); }
    .archive-btn.on { background: rgba(0,119,204,0.07); color: var(--accent); font-weight: 700; }
    html.dark .archive-btn.on { background: rgba(0,212,255,0.07); }
    .abadge { font-size: 0.67rem; background: var(--border2); color: var(--muted); padding: 0.12rem 0.48rem; border-radius: 100px; }
    .archive-btn.on .abadge { background: rgba(0,119,204,0.15); color: var(--accent); }
    html.dark .archive-btn.on .abadge { background: rgba(0,212,255,0.15); }
    .blog-post { background: var(--card-bg); border: 1.5px solid var(--border2); border-radius: 6px; padding: 1.55rem; margin-bottom: 1.1rem; transition: border-color 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; box-shadow: var(--shadow-card); }
    .blog-post::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); opacity: 0; transition: opacity 0.25s; }
    .blog-post:hover { border-color: rgba(0,119,204,0.2); box-shadow: var(--shadow-hover); }
    html.dark .blog-post:hover { border-color: rgba(0,212,255,0.15); }
    .blog-post:hover::before { opacity: 1; }
    .post-date { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); margin-bottom: 0.55rem; display: flex; align-items: center; gap: 0.45rem; letter-spacing: 0.06em; font-weight: 700; }
    .post-title { font-size: 1.06rem; font-weight: 700; color: var(--text); margin-bottom: 0.55rem; line-height: 1.45; }
    .post-excerpt { font-size: 0.88rem; color: var(--muted); line-height: 1.75; margin-bottom: 1rem; }
    .post-read { font-family: var(--mono); font-size: 0.74rem; font-weight: 700; color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 0.38rem; letter-spacing: 0.08em; text-transform: uppercase; transition: gap 0.2s; }
    .post-read:hover { gap: 0.65rem; text-decoration: none; }
    .load-more { width: 100%; background: var(--card-bg); border: 1.5px solid var(--border2); border-radius: 4px; padding: 0.82rem; font-family: var(--mono); font-size: 0.74rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); cursor: pointer; transition: all 0.2s; margin-top: 0.85rem; font-weight: 700; }
    .load-more:hover { border-color: var(--accent); color: var(--accent); }
    .blog-loading { text-align: center; padding: 3.5rem; color: var(--muted); font-family: var(--mono); font-size: 0.85rem; }

    /* ── SEARCH OVERLAY ── */
    .search-overlay { position: fixed; inset: 0; z-index: 1100; display: flex; align-items: flex-start; justify-content: center; padding-top: 90px; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); }
    html.dark .search-overlay { background: rgba(0,0,0,0.7); }
    .search-box { background: var(--bg3); border: 1.5px solid var(--border); border-radius: 8px; width: 100%; max-width: 600px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.3); }
    html.dark .search-box { box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
    .search-box-inner { display: flex; align-items: center; gap: 0.9rem; padding: 1.1rem 1.5rem; border-bottom: 1px solid var(--border2); }
    .search-box-inner i { color: var(--accent); font-size: 0.95rem; flex-shrink: 0; }
    .search-box-input { flex: 1; background: none; border: none; outline: none; font-family: var(--sans); font-size: 1.05rem; color: var(--text); }
    .search-box-input::placeholder { color: var(--muted); }
    .search-close-btn { background: none; border: 1.5px solid var(--border2); border-radius: 4px; padding: 0.18rem 0.55rem; font-family: var(--mono); font-size: 0.7rem; color: var(--muted); cursor: pointer; transition: all 0.15s; font-weight: 700; }
    .search-close-btn:hover { border-color: var(--accent); color: var(--accent); }
    .search-results { max-height: 420px; overflow-y: auto; }
    .search-result-item { padding: 0.9rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border2); cursor: pointer; transition: background 0.15s; color: var(--text); }
    .search-result-item:hover { background: rgba(0,119,204,0.05); }
    html.dark .search-result-item:hover { background: rgba(0,212,255,0.05); }
    .sri-name { font-size: 0.92rem; font-weight: 700; margin-bottom: 0.22rem; color: var(--text); }
    .sri-desc { font-size: 0.78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 440px; }
    .sri-arrow { color: var(--accent); font-size: 0.72rem; flex-shrink: 0; }
    .search-no-results, .search-empty-state { padding: 1.6rem 1.5rem; text-align: center; font-family: var(--mono); font-size: 0.8rem; color: var(--muted); }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1200; display: flex; align-items: center; justify-content: center; padding: 2rem; backdrop-filter: blur(4px); }
    html.dark .modal-overlay { background: rgba(0,0,0,0.7); }
    .modal-box { background: var(--bg3); border-radius: 8px; padding: 2.4rem; max-width: 560px; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: 0 30px 80px rgba(0,0,0,0.25); border: 1.5px solid var(--border); }
    html.dark .modal-box { box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
    .modal-title { font-size: 1.2rem; font-weight: 800; color: var(--text); margin-bottom: 1.2rem; }
    .modal-body { font-size: 0.9rem; color: var(--muted); line-height: 1.8; margin-bottom: 1.6rem; }
    .modal-body a { color: var(--accent); } .modal-body strong { color: var(--text); }
    .modal-close-btn { background: rgba(0,119,204,0.08); border: 1.5px solid var(--border); color: var(--text); padding: 0.6rem 1.5rem; border-radius: 5px; cursor: pointer; font-family: var(--sans); font-size: 0.9rem; font-weight: 600; transition: all 0.15s; }
    html.dark .modal-close-btn { background: rgba(0,212,255,0.08); }
    .modal-close-btn:hover { background: rgba(0,119,204,0.15); border-color: var(--accent); color: var(--accent); }
    html.dark .modal-close-btn:hover { background: rgba(0,212,255,0.15); }

    /* ── CHATBOT ── */
    .chat-fab { position: fixed; bottom: 1.75rem; right: 1.75rem; width: 52px; height: 52px; background: var(--accent); border: none; border-radius: 50%; color: #fff; font-size: 1.15rem; cursor: pointer; box-shadow: 0 4px 22px rgba(0,119,204,0.4); z-index: 300; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    html.dark .chat-fab { box-shadow: 0 4px 22px rgba(0,212,255,0.4); }
    .chat-fab:hover { background: var(--accent2); transform: scale(1.08); }
    .chat-panel { position: fixed; bottom: 5.5rem; right: 1.75rem; width: 340px; height: 480px; background: var(--bg3); border: 1.5px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; z-index: 299; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    html.dark .chat-panel { box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .chat-hdr { background: rgba(0,119,204,0.08); border-bottom: 1px solid var(--border2); padding: 1rem 1.1rem; display: flex; justify-content: space-between; align-items: center; }
    html.dark .chat-hdr { background: rgba(0,212,255,0.08); }
    .chat-hdr-name { font-family: var(--mono); font-size: 0.8rem; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 0.55rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .chat-online { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    .chat-x { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.95rem; transition: color 0.2s; }
    .chat-x:hover { color: var(--text); }
    .chat-msgs { flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.65rem; }
    .msg { max-width: 85%; padding: 0.6rem 0.9rem; border-radius: 8px; font-size: 0.85rem; line-height: 1.6; }
    .msg-bot { background: var(--bg2); border: 1px solid var(--border2); color: var(--text); align-self: flex-start; border-bottom-left-radius: 2px; }
    .msg-user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 600; }
    .chat-sugg { padding: 0.55rem 0.8rem; border-top: 1px solid var(--border2); display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .csugg { font-family: var(--mono); font-size: 0.67rem; letter-spacing: 0.05em; padding: 0.3rem 0.65rem; background: transparent; border: 1px solid var(--border2); border-radius: 3px; cursor: pointer; color: var(--muted); transition: all 0.15s; }
    .csugg:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,119,204,0.06); }
    html.dark .csugg:hover { background: rgba(0,212,255,0.06); }
    .chat-input-row { display: flex; gap: 0.45rem; padding: 0.7rem; border-top: 1px solid var(--border2); }
    .chat-input { flex: 1; background: var(--bg2); border: 1.5px solid var(--border2); border-radius: 5px; padding: 0.5rem 0.85rem; font-family: var(--sans); font-size: 0.87rem; color: var(--text); outline: none; transition: border-color 0.2s; }
    .chat-input:focus { border-color: var(--accent); }
    .chat-send { background: var(--accent); border: none; color: #fff; width: 36px; height: 36px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; transition: background 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-send:hover { background: var(--accent2); }

    /* ── FOOTER ── */
    footer { background: var(--bg); border-top: 1.5px solid var(--border2); padding: 4rem 3.5rem 2rem; position: relative; z-index: 2; }
    .footer-inner { max-width: 1240px; margin: 0 auto; }
    .footer-grid { display: grid; grid-template-columns: 1.6fr repeat(3,1fr); gap: 3.5rem; margin-bottom: 3rem; }
    .fbrand-name { font-family: var(--mono); font-size: 0.92rem; font-weight: 700; color: var(--text); letter-spacing: 0.06em; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.55rem; }
    .fbrand-icon { background: var(--accent); color: #fff; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; }
    .fbrand-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.75; margin-bottom: 1.35rem; }
    .fsocials { display: flex; gap: 0.55rem; }
    .fsoc { width: 34px; height: 34px; border: 1.5px solid var(--border2); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.82rem; text-decoration: none; transition: all 0.2s; }
    .fsoc:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
    .fcol-title { font-family: var(--mono); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text); margin-bottom: 1.1rem; }
    .flink { display: block; font-size: 0.88rem; color: var(--muted); text-decoration: none; padding: 0.3rem 0; transition: color 0.2s; cursor: pointer; }
    .flink:hover { color: var(--accent); text-decoration: none; }
    .footer-bottom { border-top: 1px solid var(--border2); padding-top: 1.6rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.85rem; }
    .footer-bottom p { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }
    .footer-bottom span { color: var(--accent); }

    /* ── THEME TOGGLE ── */
    .theme-toggle { display: flex; align-items: center; gap: 0.5rem; font-family: var(--mono); font-size: 0.7rem; color: var(--muted); user-select: none; cursor: pointer; }
    .toggle-track { position: relative; width: 40px; height: 22px; background: var(--bg2); border-radius: 100px; border: 1.5px solid var(--border2); cursor: pointer; transition: all 0.25s; flex-shrink: 0; }
    .toggle-track.on { background: var(--accent); border-color: var(--accent); }
    .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: var(--muted); border-radius: 50%; transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), background 0.25s; }
    .toggle-track.on .toggle-thumb { transform: translateX(18px); background: #fff; }

    /* ── SCROLL FADE-IN (home section only) ── */
    .fade-up { opacity: 0; transform: translateY(32px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
    .fade-left { opacity: 0; transform: translateX(-30px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-left.visible { opacity: 1; transform: translateX(0); }

    .stagger > *:nth-child(1)  { transition-delay: 0.04s; }
    .stagger > *:nth-child(2)  { transition-delay: 0.10s; }
    .stagger > *:nth-child(3)  { transition-delay: 0.17s; }
    .stagger > *:nth-child(4)  { transition-delay: 0.24s; }
    .stagger > *:nth-child(5)  { transition-delay: 0.31s; }
    .stagger > *:nth-child(6)  { transition-delay: 0.38s; }
    .stagger > *:nth-child(7)  { transition-delay: 0.45s; }
    .stagger > *:nth-child(8)  { transition-delay: 0.52s; }
    .stagger > *:nth-child(9)  { transition-delay: 0.59s; }
    .stagger > *:nth-child(10) { transition-delay: 0.66s; }
    .stagger > *:nth-child(11) { transition-delay: 0.73s; }
    .stagger > *:nth-child(12) { transition-delay: 0.80s; }
    .stagger > *:nth-child(13) { transition-delay: 0.87s; }
    .stagger > *:nth-child(14) { transition-delay: 0.94s; }
    .stagger > *:nth-child(15) { transition-delay: 1.01s; }
    .stagger > *:nth-child(16) { transition-delay: 1.08s; }
    .stagger > *:nth-child(17) { transition-delay: 1.15s; }
    .stagger > *:nth-child(18) { transition-delay: 1.22s; }
    .stagger > *:nth-child(19) { transition-delay: 1.29s; }
    .stagger > *:nth-child(20) { transition-delay: 1.36s; }
    .stagger > *:nth-child(21) { transition-delay: 1.43s; }

    @keyframes fadeSlideUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

    /* Loading skeleton */
    .img-skeleton {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--border2) 50%, var(--bg2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Blog preload skeleton */
    .post-skeleton { background: var(--card-bg); border: 1.5px solid var(--border2); border-radius: 6px; padding: 1.55rem; margin-bottom: 1.1rem; }
    .skel-line { height: 14px; border-radius: 4px; background: var(--bg2); margin-bottom: 10px; }
    .skel-line.skel-title { height: 18px; width: 75%; }
    .skel-line.skel-short { width: 40%; }
    .skel-line.skel-med { width: 90%; }

    /* ── RESPONSIVE ── */
    @media(max-width:1100px) {
      .card-grid { grid-template-columns: repeat(2,1fr); }
      .footer-grid { grid-template-columns: 1fr 1fr; gap: 2.5rem; }
    }
    @media(max-width:900px) {
      .hero-inner { flex-direction: column; gap: 3rem; }
      .hero-right { width: 100%; max-width: 560px; }
      .navbar { padding: 0 1.5rem; }
      .hero, .section, .testi-section, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
    }
    @media(max-width:768px) {
      html { font-size: 16px; }
      .navbar { padding: 0 1.15rem; height: 60px; }
      .mobile-nav { top: 60px; }
      .hero, .section, .testi-section, footer { padding-left: 1.15rem; padding-right: 1.15rem; }
      .hero { padding-top: 7rem; padding-bottom: 4rem; }
      .nav-links { display: none; }
      .mobile-btn { display: block; }
      .card-grid { grid-template-columns: 1fr; }
      .why-grid { grid-template-columns: 1fr; }
      .blog-layout { flex-direction: column; }
      .blog-sidebar { width: 100%; position: static; }
      .footer-grid { grid-template-columns: 1fr; gap: 1.75rem; }
      .footer-bottom { flex-direction: column; text-align: center; align-items: center; }
      .hero-metrics { gap: 1.75rem; }
      .testi-quote::before { display: none; }
      .testi-quote { padding: 0; }
      .section { padding-top: 4rem; padding-bottom: 4rem; }
    }
    @media(max-width:480px) {
      html { font-size: 15.5px; }
      .hero-title { font-size: 2.4rem; }
      .chat-panel { width: calc(100vw - 2.5rem); right: 1.15rem; }
      .search-overlay { padding: 70px 1rem 0; }
      .hero-metrics { flex-direction: column; gap: 1.2rem; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const shinyApps = [
  {id:1,  cat:'factor',   name:"FactorGuard",          desc:"Parallel analysis and scree plot tool for factor retention in exploratory factor analysis (EFA), helping researchers identify the optimal number of factors.",                                  logo:"https://raw.githubusercontent.com/mudassiribrahim12/me/main/FactorGuard.png",    run:"https://mudassiribrahim2026.shinyapps.io/FactorGuard/",        code:"https://github.com/mudassiribrahim30/R-Shiny-Apps/blob/main/FactorGuard.R"},

const useFadeIn = (threshold=0.12) => {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } }, {threshold});
    obs.observe(el); return () => obs.disconnect();
  }, [threshold]);
  return ref;
};

const useStaggerFadeIn = (threshold=0.06) => {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.querySelectorAll('.fade-up,.fade-left').forEach(c => c.classList.add('visible')); obs.disconnect(); }
    }, {threshold});
    obs.observe(el); return () => obs.disconnect();
  }, [threshold]);
  return ref;
};

/* ── HOME-ONLY: per-card fade for the Featured section ── */
const usePerCardFadeIn = () => {
  const ref = useRef(null);
  useEffect(() => {
    const grid = ref.current; if (!grid) return;
    const cards = Array.from(grid.querySelectorAll('.fade-up'));
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, {threshold: 0.06, rootMargin:'0px 0px -10px 0px'});
    cards.forEach(c => obs.observe(c)); return () => obs.disconnect();
  }, []);
  return ref;
};

const useCounter = (target, duration=1700) => {
  const [count, setCount] = useState(0);
  const ref = useRef(null); const started = useRef(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        let t0 = null;
        const step = ts => { if (!t0) t0=ts; const p=Math.min((ts-t0)/duration,1); setCount(Math.round((1-Math.pow(1-p,3))*target)); if(p<1) requestAnimationFrame(step); };
        requestAnimationFrame(step); obs.disconnect();
      }
    }, {threshold:0.5});
    obs.observe(el); return () => obs.disconnect();
  }, [target, duration]);
  return [count, ref];
};

const useDarkMode = () => {
  const [dark, setDark] = useState(() => {
    try { return localStorage.getItem('sht-theme') === 'dark'; }
    catch { return false; }
  });
  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    document.documentElement.classList.toggle('light', !dark);
    try { localStorage.setItem('sht-theme', dark ? 'dark' : 'light'); } catch {}
  }, [dark]);
  return [dark, setDark];
};

/* ── CODE BOX ── */
const CodeBox = () => {
  const [revealedLines, setRevealedLines] = useState(0);
  const [cur, setCur] = useState(true);
  const animating = useRef(false);
  const boxRef = useRef(null);

  useEffect(() => { const ci = setInterval(() => setCur(p=>!p), 520); return () => clearInterval(ci); }, []);

  useEffect(() => {
    const el = boxRef.current; if (!el) return;
    const run = () => {
      animating.current = true;
      let i = 0;
      const tick = () => {
        if (i < codeLines.length) { setRevealedLines(i+1); i++; setTimeout(tick, 185); }
        else { setTimeout(() => { setRevealedLines(0); animating.current = false; obs.observe(el); }, 3800); }
      };
      tick();
    };
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting && !animating.current) { obs.disconnect(); run(); } }, {threshold:0.3});
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  return (
    <div className="code-box" ref={boxRef}>
      <div className="code-hdr">
        <div className="cdot cdot-r"></div><div className="cdot cdot-y"></div><div className="cdot cdot-g"></div>
        <span className="code-fname">analysis.R — ShinyHealthTools</span>
      </div>
      <div className="code-body">
        {codeLines.map((line, i) => (
          <div key={i} className="code-line" style={{visibility: i < revealedLines ? 'visible' : 'hidden'}}
            dangerouslySetInnerHTML={{__html: (line.h||'&nbsp;') + (i===revealedLines-1 ? `<span class="cursor" style="opacity:${cur?1:0}"></span>` : '')}}/>
        ))}
        {revealedLines===0 && codeLines.map((_,i)=><div key={'p'+i} className="code-line" style={{visibility:'hidden'}} dangerouslySetInnerHTML={{__html:'&nbsp;'}}/>)}
      </div>
    </div>
  );
};

const SearchOverlay = ({onClose}) => {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const inputRef = useRef(null);
  useEffect(() => {
    inputRef.current?.focus();
    const h = e => { if(e.key==='Escape') onClose(); };
    document.addEventListener('keydown',h); return () => document.removeEventListener('keydown',h);
  }, []);
  const doSearch = q => {
    if (!q.trim()) { setResults([]); return; }
    const lq = q.toLowerCase();
    setResults(shinyApps.filter(a => a.name.toLowerCase().includes(lq)||a.desc.toLowerCase().includes(lq)));
  };
  return (
    <div className="search-overlay" onClick={onClose}>
      <div className="search-box" onClick={e=>e.stopPropagation()}>
        <div className="search-box-inner">
          <i className="fas fa-search"></i>
          <input ref={inputRef} className="search-box-input" placeholder="Search 21 statistical tools…"
            value={query} onChange={e=>{setQuery(e.target.value);doSearch(e.target.value);}}/>
          <button className="search-close-btn" onClick={onClose}>ESC</button>
        </div>
        <div className="search-results">
          {!query.trim() && <div className="search-empty-state">Start typing to search all 21 tools.</div>}
          {query.trim() && results.length===0 && <div className="search-no-results">No match for "{query}"</div>}
          {results.map(r=>(
            <div key={r.id} className="search-result-item" onClick={()=>{window.open(r.run,'_blank');onClose();}}>
              <div><div className="sri-name">{r.name}</div><div className="sri-desc">{r.desc}</div></div>
              <i className="fas fa-external-link-alt sri-arrow"></i>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ── APPS TAB ──
   FIX: Cards are rendered WITHOUT fade-up class so they are always visible.
   Filter changes simply re-render the grid — no IntersectionObserver needed.
   A lightweight CSS entry animation is added via a key prop so React remounts
   the grid on filter change, triggering a fresh slide-in without any observer.
── */
const AppsTab = () => {
  const [activeFilter, setActiveFilter] = useState('all');
  const hdrRef = useFadeIn();

  const filters = [
    {k:'all',    l:'All'},
    {k:'stats',  l:'Statistics'},
    {k:'viz',    l:'Visualization'},
    {k:'data',   l:'Data Tools'},
    {k:'factor', l:'Factor Analysis'}
  ];

  const filtered = activeFilter === 'all'
    ? shinyApps
    : shinyApps.filter(a => a.cat === activeFilter);

  return (
    <div className="section">
      <div className="section-inner">
        <div className="section-hdr fade-up" ref={hdrRef}>
          <div className="section-tag-label">All Applications</div>
          <h2 className="section-title">21 Web Tools</h2>
          <p className="section-sub">Every application is open source, browser-based, and free for academic and research purposes.</p>
        </div>

        <div className="filter-bar">
          {filters.map(f => (
            <button
              key={f.k}
              className={`filter-btn${activeFilter === f.k ? ' active' : ''}`}
              onClick={() => setActiveFilter(f.k)}
            >
              {f.l}{f.k !== 'all' && ` (${shinyApps.filter(a => a.cat === f.k).length})`}
            </button>
          ))}
        </div>

        {/*
          KEY on the grid = activeFilter: when filter changes React destroys and
          remounts the div, which triggers the CSS animation again on fresh cards.
          Cards use useFade=false so they are fully visible immediately — no
          IntersectionObserver that fires only once and then disconnects.
        */}
        <div
          key={activeFilter}
          className="card-grid"
          style={{animation: 'gridFadeIn 0.35s ease forwards'}}
        >
          {filtered.map(a => <AppCard key={a.id} app={a} useFade={false} />)}
        </div>

        <style>{`
          @keyframes gridFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
          }
        `}</style>
      </div>
    </div>
  );
};

/* ── BLOG TAB — preloads on mount ── */
const BlogTab = ({blogData}) => {
  const [visible, setVisible] = useState(10);
  const [selMonth, setSelMonth] = useState(null);
  const [filtered, setFiltered] = useState(blogData.posts || []);
  const hdrRef = useFadeIn();

  useEffect(() => {
    setFiltered(blogData.posts || []);
    setSelMonth(null);
    setVisible(10);
  }, [blogData.posts]);

  const excerpt = (html, max=220) => {
    if (!html) return '';
    const t = document.createElement('textarea');
    t.innerHTML = html.replace(/<[^>]*>/g,'');
    const s = t.value.replace(/\s+/g,' ').trim();
    return s.length > max ? s.slice(0,max)+'...' : s;
  };

  const grouped = {};
  (blogData.posts||[]).forEach(p => {
    const d = new Date(p.published?.$t||Date.now());
    const k = d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    if (!grouped[k]) grouped[k] = {d, posts:[]};
    grouped[k].posts.push(p);
  });
  const months = Object.entries(grouped).sort(([,a],[,b])=>b.d-a.d);
  const selectMonth = k => {
    if(selMonth===k){setSelMonth(null);setFiltered(blogData.posts||[]);}
    else{setSelMonth(k);setFiltered(grouped[k]?.posts||[]);}
    setVisible(10);
  };

  const SkeletonPosts = () => Array.from({length:4}).map((_,i) => (
    <div className="post-skeleton" key={i}>
      <div className="skel-line skel-short img-skeleton"></div>
      <div className="skel-line skel-title img-skeleton"></div>
      <div className="skel-line skel-med img-skeleton"></div>
      <div className="skel-line skel-med img-skeleton"></div>
      <div className="skel-line skel-short img-skeleton" style={{width:'30%'}}></div>
    </div>
  ));

  return (
    <div className="section">
      <div className="section-inner">
        <div className="section-hdr fade-up" ref={hdrRef}>
          <div className="section-tag-label">Blog</div>
          <h2 className="section-title">Insights & Updates</h2>
          <p className="section-sub">Perspectives on ShinyHealthTools, statistical methods, and health data science.</p>
        </div>

        {blogData.loading ? (
          <div className="blog-layout">
            <div className="blog-sidebar">
              <div className="sidebar-panel">
                <div className="sp-header">// Filter by month</div>
                {Array.from({length:5}).map((_,i) => (
                  <div key={i} style={{padding:'0.65rem 1.1rem', borderBottom:'1px solid var(--border2)'}}>
                    <div className="skel-line img-skeleton" style={{height:'12px', width:'80%', margin:0}}></div>
                  </div>
                ))}
              </div>
            </div>
            <div className="blog-main"><SkeletonPosts/></div>
          </div>
        ) : blogData.error ? (
          <div className="blog-loading">
            <p style={{marginBottom:'0.9rem', color:'var(--muted)'}}>Unable to load posts automatically.</p>
            <a href="https://mudasir-ibrahim.blogspot.com" target="_blank" className="btn-primary" style={{display:'inline-flex'}}>
              <i className="fas fa-external-link-alt"></i> Open Blog
            </a>
          </div>
        ) : (
          <div className="blog-layout">
            <div className="blog-sidebar">
              <div className="sidebar-panel">
                <div className="sp-header">// Filter by month</div>
                <button className={`archive-btn${!selMonth?' on':''}`} onClick={()=>{setSelMonth(null);setFiltered(blogData.posts||[]);setVisible(10);}}>
                  All posts <span className="abadge">{(blogData.posts||[]).length}</span>
                </button>
                {months.map(([k,v])=>(
                  <button key={k} className={`archive-btn${selMonth===k?' on':''}`} onClick={()=>selectMonth(k)}>
                    {k} <span className="abadge">{v.posts.length}</span>
                  </button>
                ))}
              </div>
            </div>
            <div className="blog-main">
              {filtered.slice(0,visible).map((post,i)=>{
                const title = post.title?.$t||'Untitled';
                const date = new Date(post.published?.$t).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
                const link = post.link?.find(l=>l.rel==='alternate')?.href||'#';
                return (
                  <div key={i} className="blog-post">
                    <div className="post-date"><i className="far fa-calendar-alt"></i>{date}</div>
                    <div className="post-title">{title}</div>
                    <div className="post-excerpt">{excerpt(post.content?.$t)}</div>
                    <a href={link} target="_blank" className="post-read">
                      Read full post <i className="fas fa-arrow-right" style={{fontSize:'0.68rem'}}></i>
                    </a>
                  </div>
                );
              })}
              {visible < filtered.length && (
                <button className="load-more" onClick={()=>setVisible(v=>v+10)}>
                  <i className="fas fa-chevron-down" style={{marginRight:'0.45rem'}}></i>
                  Load more ({filtered.length-visible} remaining)
                </button>
              )}
              {visible >= filtered.length && filtered.length > 0 && (
                <p style={{textAlign:'center',fontFamily:"'Space Mono',monospace",fontSize:'0.74rem',color:'var(--muted)',marginTop:'1.1rem',letterSpacing:'0.08em',fontWeight:'700'}}>
                  <i className="fas fa-check-circle" style={{color:'var(--green)',marginRight:'0.45rem'}}></i>
                  All {filtered.length} posts shown
                </p>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

const Modal = ({title, content, onClose}) => {
  useEffect(()=>{document.body.classList.add('modal-open');return()=>document.body.classList.remove('modal-open');},[]);
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{title}</div>
        <div className="modal-body" dangerouslySetInnerHTML={{__html:content}}/>
        <button className="modal-close-btn" onClick={onClose}>Close</button>
      </div>
    </div>
  );
};

const ChatBot = () => {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([{s:'bot',t:"Hi! I'm the ShinyHealthTools assistant. Ask me anything about our tools or how to get started."}]);
  const [input, setInput] = useState('');
  const [showSug, setShowSug] = useState(true);
  const endRef = useRef(null);
  const sugs = ["What tools are available?","Are these tools free?","Tell me about CalcuStats","How do I cite ShinyHealthTools?","Is source code available?"];
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[msgs]);
  const respond = q => {
    const lq = q.toLowerCase();
    if(lq.includes('free')||lq.includes('cost')) return "All 21 tools are completely free for academic, government, and non-profit use. No license fees or subscriptions.";
    if(lq.includes('calcustats')||lq.includes('sample size')) return "CalcuStats handles sample size calculation, power analysis, and descriptive statistics — ideal for clinical trial planning.";
    if(lq.includes('cite')) return "Cite as: 'Shiny Health Tools (2025). ShinyHealthTools: Statistical applications for health research. Retrieved from the website URL.'";
    if(lq.includes('source')||lq.includes('github')) return "All source code is at github.com/mudassiribrahim30 under MIT license. Fully open and auditable.";
    if(lq.includes('how many')||lq.includes('available')) return "There are 21 validated applications covering survival, ROC, factor analysis, regression, mediation, data conversion, and more.";
    if(lq.includes('roc')) return "ROC Curve Builder generates ROC curves and evaluates diagnostic test performance with AUC and confidence intervals.";
    if(lq.includes('hello')||lq.includes('hi')) return "Hello! How can I help you with ShinyHealthTools today?";
    return "Try asking about a specific app (e.g. 'Tell me about MedModr'), or browse the Apps tab to see all 21 tools.";
  };
  const send = text => {
    if(!text.trim()) return;
    setMsgs(p=>[...p,{s:'user',t:text}]);
    setShowSug(false);
    setTimeout(()=>setMsgs(p=>[...p,{s:'bot',t:respond(text)}]),320);
    setInput('');
  };
  return (
    <>
      <button className="chat-fab" onClick={()=>setOpen(!open)} title="Chat with assistant">
        <i className={`fas fa-${open?'times':'comment-dots'}`}></i>
      </button>
      {open && (
        <div className="chat-panel">
          <div className="chat-hdr">
            <div className="chat-hdr-name"><div className="chat-online"></div>// SHT Assistant</div>
            <button className="chat-x" onClick={()=>setOpen(false)}><i className="fas fa-times"></i></button>
          </div>
          <div className="chat-msgs">
            {msgs.map((m,i)=><div key={i} className={`msg msg-${m.s}`}>{m.t}</div>)}
            <div ref={endRef}/>
          </div>
          {showSug && <div className="chat-sugg">{sugs.map((s,i)=><button key={i} className="csugg" onClick={()=>send(s)}>{s}</button>)}</div>}
          <div className="chat-input-row">
            <input className="chat-input" placeholder="Ask a question…" value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyPress={e=>e.key==='Enter'&&send(input)}
              onFocus={()=>setShowSug(true)}/>
            <button className="chat-send" onClick={()=>send(input)}><i className="fas fa-paper-plane"></i></button>
          </div>
        </div>
      )}
    </>
  );
};

          <a href="https://mudasiribrahim.vercel.app/" target="_blank" className="nav-link">Developer</a>
          <button className="nav-link" onClick={()=>openModal('Support & Appreciation','If any of the apps have been helpful, consider <a href="https://buymeacoffee.com/mudasiribrahim30" target="_blank">supporting the project ☕</a>.<br/><br/>For technical assistance, contact <a href="mailto:mudassiribrahim30@gmail.com">mudassiribrahim30@gmail.com</a>. Responses typically within 24 hours on business days.')}>Support</button>
          <a href="https://github.com/mudassiribrahim30/R-Shiny-Apps" target="_blank" className="nav-link-gh"><i className="fab fa-github"></i> GitHub</a>
          <button className="nav-search-btn" onClick={()=>setSearchOpen(true)} title="Search (⌘K)"><i className="fas fa-search"></i></button>
